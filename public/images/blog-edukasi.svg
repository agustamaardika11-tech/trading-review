<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" fill="none">
  <rect width="400" height="250" rx="16" fill="#eff6ff"/>
  <!-- Book -->
  <path d="M120,60 L200,80 L280,60 L280,190 L200,210 L120,190 Z" fill="white" stroke="#bfdbfe" stroke-width="2"/>
  <line x1="200" y1="80" x2="200" y2="210" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Left page lines -->
  <rect x="135" y="100" width="50" height="5" rx="2" fill="#bfdbfe"/>
  <rect x="135" y="115" width="45" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="135" y="127" width="50" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="135" y="139" width="40" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="135" y="155" width="50" height="5" rx="2" fill="#bfdbfe"/>
  <rect x="135" y="170" width="45" height="4" rx="2" fill="#e2e8f0"/>
  <!-- Right page lines -->
  <rect x="215" y="100" width="50" height="5" rx="2" fill="#bfdbfe"/>
  <rect x="215" y="115" width="45" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="215" y="127" width="50" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="215" y="139" width="40" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="215" y="155" width="50" height="5" rx="2" fill="#bfdbfe"/>
  <rect x="215" y="170" width="45" height="4" rx="2" fill="#e2e8f0"/>
  <!-- Graduation cap -->
  <polygon points="200,30 240,50 200,65 160,50" fill="#2563eb"/>
  <line x1="200" y1="65" x2="200" y2="80" stroke="#2563eb" stroke-width="2"/>
  <rect x="196" y="28" width="8" height="6" rx="2" fill="#1e40af"/>
  <line x1="240" y1="50" x2="240" y2="72" stroke="#2563eb" stroke-width="2"/>
  <circle cx="240" cy="74" r="3" fill="#fbbf24"/>
  <!-- Chart small -->
  <path d="M300,180 L320,160 L340,170 L360,140" stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="300" cy="180" r="3" fill="#3b82f6"/>
  <circle cx="320" cy="160" r="3" fill="#3b82f6"/>
  <circle cx="340" cy="170" r="3" fill="#3b82f6"/>
  <circle cx="360" cy="140" r="3" fill="#3b82f6"/>
  <!-- Arrow up -->
  <polygon points="360,140 366,150 354,150" fill="#34d399"/>
</svg>
