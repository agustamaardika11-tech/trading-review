  <line x1="50" y1="300" x2="550" y2="300" stroke="#93c5fd" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Candlesticks -->
  <line x1="80" y1="180" x2="80" y2="280" stroke="#60a5fa" stroke-width="2"/>
