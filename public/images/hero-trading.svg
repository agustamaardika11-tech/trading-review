  <line x1="150" y1="50" x2="150" y2="350" stroke="#93c5fd" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="250" y1="50" x2="250" y2="350" stroke="#93c5fd" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="350" y1="50" x2="350" y2="350" stroke="#93c5fd" stroke-opacity="0.3" stroke-width="1"/>
