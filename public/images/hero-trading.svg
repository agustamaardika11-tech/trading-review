  <rect x="272" y="110" width="16" height="60" fill="#3b82f6" rx="2"/>
  <line x1="320" y1="90" x2="320" y2="190" stroke="#60a5fa" stroke-width="2"/>
  <rect x="312" y="100" width="16" height="55" fill="#3b82f6" rx="2"/>
  <line x1="360" y1="110" x2="360" y2="210" stroke="#60a5fa" stroke-width="2"/>
  <rect x="352" y="130" width="16" height="50" fill="#ef4444" rx="2"/>
  <line x1="400" y1="80" x2="400" y2="180" stroke="#60a5fa" stroke-width="2"/>
  <rect x="392" y="90" width="16" height="60" fill="#3b82f6" rx="2"/>
  <line x1="440" y1="70" x2="440" y2="170" stroke="#60a5fa" stroke-width="2"/>
  <rect x="432" y="80" width="16" height="55" fill="#3b82f6" rx="2"/>
