  <text x="505" y="67" text-anchor="middle" fill="white" font-size="13" font-family="system-ui" font-weight="600">$3,350.50</text>
  <!-- Arrow up -->
  <polygon points="540,340 555,310 525,310" fill="#34d399" opacity="0.9"/>
  <text x="540" y="365" text-anchor="middle" fill="#34d399" font-size="14" font-family="system-ui" font-weight="700">+2.4%</text>
