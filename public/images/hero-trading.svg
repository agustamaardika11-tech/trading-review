  <line x1="160" y1="140" x2="160" y2="240" stroke="#60a5fa" stroke-width="2"/>
  <rect x="152" y="150" width="16" height="55" fill="#3b82f6" rx="2"/>
  <line x1="200" y1="120" x2="200" y2="220" stroke="#60a5fa" stroke-width="2"/>
  <rect x="192" y="130" width="16" height="65" fill="#3b82f6" rx="2"/>
