<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#eff6ff"/>
  <!-- Calculator body -->
  <rect x="100" y="30" width="200" height="240" rx="16" fill="white" stroke="#bfdbfe" stroke-width="2"/>
  <!-- Screen -->
  <rect x="120" y="50" width="160" height="50" rx="8" fill="#1e40af"/>
  <text x="260" y="82" text-anchor="end" fill="white" font-size="22" font-family="monospace" font-weight="700">$1,250.00</text>
  <text x="260" y="68" text-anchor="end" fill="#93c5fd" font-size="10" font-family="system-ui">Required Margin</text>
  <!-- Buttons row 1 -->
  <rect x="120" y="115" width="35" height="30" rx="6" fill="#dbeafe"/><text x="137" y="135" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">7</text>
  <rect x="162" y="115" width="35" height="30" rx="6" fill="#dbeafe"/><text x="179" y="135" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">8</text>
  <rect x="204" y="115" width="35" height="30" rx="6" fill="#dbeafe"/><text x="221" y="135" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">9</text>
  <rect x="246" y="115" width="35" height="30" rx="6" fill="#3b82f6"/><text x="263" y="135" text-anchor="middle" fill="white" font-size="13" font-family="system-ui" font-weight="600">÷</text>
  <!-- Buttons row 2 -->
  <rect x="120" y="152" width="35" height="30" rx="6" fill="#dbeafe"/><text x="137" y="172" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">4</text>
  <rect x="162" y="152" width="35" height="30" rx="6" fill="#dbeafe"/><text x="179" y="172" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">5</text>
  <rect x="204" y="152" width="35" height="30" rx="6" fill="#dbeafe"/><text x="221" y="172" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">6</text>
  <rect x="246" y="152" width="35" height="30" rx="6" fill="#3b82f6"/><text x="263" y="172" text-anchor="middle" fill="white" font-size="13" font-family="system-ui" font-weight="600">×</text>
  <!-- Buttons row 3 -->
  <rect x="120" y="189" width="35" height="30" rx="6" fill="#dbeafe"/><text x="137" y="209" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">1</text>
  <rect x="162" y="189" width="35" height="30" rx="6" fill="#dbeafe"/><text x="179" y="209" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">2</text>
  <rect x="204" y="189" width="35" height="30" rx="6" fill="#dbeafe"/><text x="221" y="209" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">3</text>
  <rect x="246" y="189" width="35" height="30" rx="6" fill="#3b82f6"/><text x="263" y="209" text-anchor="middle" fill="white" font-size="13" font-family="system-ui" font-weight="600">−</text>
  <!-- Buttons row 4 -->
  <rect x="120" y="226" width="77" height="30" rx="6" fill="#dbeafe"/><text x="158" y="246" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">0</text>
  <rect x="204" y="226" width="35" height="30" rx="6" fill="#dbeafe"/><text x="221" y="246" text-anchor="middle" fill="#1e40af" font-size="13" font-family="system-ui" font-weight="600">.</text>
  <rect x="246" y="226" width="35" height="30" rx="6" fill="#2563eb"/><text x="263" y="246" text-anchor="middle" fill="white" font-size="13" font-family="system-ui" font-weight="700">=</text>
